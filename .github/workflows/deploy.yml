name: Deploy BCS Preparation Platform

on:
  push:
    branches:
      - main

jobs:
  verify:
    name: Verify & Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'webapp/bcs-web/package-lock.json'

      - name: Install WebApp Dependencies
        run: |
          cd webapp/bcs-web
          npm install

      - name: Run TypeScript Verification
        run: |
          cd webapp/bcs-web
          npx tsc --noEmit

  deploy:
    name: Deploy to AWS EC2
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: SSH and Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # Navigate to the workspace (clone if directory doesn't exist, pull otherwise)
            if [ ! -d "/home/ubuntu/bcs-preparation-platform" ]; then
              git clone https://github.com/bilash-biswas/bcs-preparation-platform.git /home/ubuntu/bcs-preparation-platform
            fi
            
            cd /home/ubuntu/bcs-preparation-platform
            
            # Fetch latest modifications
            git fetch --all
            git reset --hard origin/main
            
            # Restart docker containers with clean compilation
            docker-compose down
            docker-compose up -d --build
            
            # Wait for database to initialize and accept connections
            echo "Waiting for database to be ready..."
            docker exec bcs_api python -c "
import time
from django.db import connections
from django.db.utils import OperationalError
for i in range(30):
    try:
        connections['default'].cursor()
        print('Database is ready!')
        break
    except OperationalError:
        print('Database not ready yet, sleeping...')
        time.sleep(1)
"
            
            # Execute database migrations
            docker exec bcs_api python manage.py migrate

