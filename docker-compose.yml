services:
  db:
    image: postgres:15-alpine
    container_name: bcs_db
    environment:
      POSTGRES_DB: bcs_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: bilashbi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bcs_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bcs_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: bcs_api
    command: >
      sh -c "python manage.py migrate &&
             python manage.py shell -c \"from django.contrib.auth import get_user_model; User = get_user_model(); User.objects.filter(username='admin').exists() or User.objects.create_superuser('admin', 'admin@example.com', 'adminpass')\" &&
             daphne -b 0.0.0.0 -p 8000 bcs_preparation.asgi:application"
    volumes:
      - ./api:/app
      - /app/venv
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=bcs_db
      - DB_USER=postgres
      - DB_PASSWORD=bilashbi
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  webapp:
    build:
      context: ./webapp/bcs-web
      dockerfile: Dockerfile
    container_name: bcs_webapp
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=/api
    volumes:
      - ./webapp/bcs-web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api

volumes:
  postgres_data:
